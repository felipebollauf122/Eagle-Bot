services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction
    networks:
      - eaglenet

  eaglebot:
    build: ./server
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    networks:
      - eaglenet

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - eaglebot
    networks:
      - eaglenet

volumes:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  eaglenet:
